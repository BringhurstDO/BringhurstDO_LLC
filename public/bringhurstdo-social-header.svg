<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">BringhurstDO LLC social header</title>
  <desc id="desc">A refined clinical and industrial systems social header for BringhurstDO LLC with a subtle product orchestration panel.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08131B"/>
      <stop offset="0.5" stop-color="#10202A"/>
      <stop offset="1" stop-color="#1A2D37"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 305) rotate(-12) scale(520 260)">
      <stop offset="0" stop-color="#247D8A" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#247D8A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#247D8A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1135 180) rotate(130) scale(560 320)">
      <stop offset="0" stop-color="#66CBEA" stop-opacity="0.2"/>
      <stop offset="0.56" stop-color="#66CBEA" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#66CBEA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelGradient" x1="840" y1="90" x2="1360" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FCFE" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#D7F5FE" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <pattern id="subtleGrid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <pattern id="hexTexture" width="56" height="98" patternUnits="userSpaceOnUse" patternTransform="translate(8 0)">
      <g fill-rule="evenodd">
        <g fill="#FFFFFF" fill-opacity="0.034" fill-rule="nonzero">
          <path d="M27.98 18.5l26 15v30l-26 15L2 63.5v-30l25.98-15zM6 35.8v25.4l21.98 12.68 22-12.7V35.8l-22-12.68L6 35.8zM0 30l25.96-15V0h-4v12.7L0 25.38V30zm0 37l25.96 15v16h-4V84.3L0 71.62V67zM30 0v15l25.98 15H56v-4.62h-.02L34 12.7V0h-4zm0 98V82l25.98-15H56v4.62h-.02L34 84.3V98h-4z"/>
        </g>
      </g>
    </pattern>

    <clipPath id="panelClip">
      <rect x="825" y="86" width="565" height="330" rx="36"/>
    </clipPath>
  </defs>

  <rect width="1500" height="500" fill="url(#bgGradient)"/>
  <rect width="1500" height="500" fill="url(#hexTexture)" opacity="0.26"/>
  <rect width="1500" height="500" fill="url(#subtleGrid)" opacity="0.52"/>
  <rect width="1500" height="500" fill="url(#glowLeft)"/>
  <rect width="1500" height="500" fill="url(#glowRight)"/>
  <path d="M86 100C226 50 370 52 498 100C625 148 758 152 898 102C1052 48 1210 50 1418 104" fill="none" stroke="#66CBEA" stroke-opacity="0.05" stroke-width="2"/>

  <g transform="translate(184 98)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#17303B" stroke="#66CBEA" stroke-opacity="0.27"/>
    <circle cx="23" cy="18" r="6" fill="#247D8A"/>
    <text x="42" y="23" fill="#BDEFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">BRINGHURSTDO LLC</text>

    <text x="0" y="112" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="830" letter-spacing="-1.2">
      <tspan x="0" dy="0">Engineering systems for</tspan>
      <tspan x="0" dy="59">clinical, industrial, and</tspan>
      <tspan x="0" dy="59">learning workflows</tspan>
    </text>

