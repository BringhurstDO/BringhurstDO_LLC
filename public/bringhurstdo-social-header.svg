    <g clip-path="url(#panelClip)">
      <rect x="825" y="86" width="565" height="330" fill="#07131C" opacity="0.24"/>

      <rect x="857" y="114" width="500" height="42" rx="18" fill="#FFFFFF" opacity="0.05"/>
      <rect x="875" y="124" width="26" height="22" rx="8" fill="#247D8A" opacity="0.45"/>
      <text x="914" y="140" fill="#F5FBFE" opacity="0.88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">BringhurstDO Systems</text>
      <rect x="1215" y="124" width="68" height="18" rx="9" fill="#FFFFFF" opacity="0.06"/>
      <rect x="1292" y="124" width="30" height="18" rx="9" fill="#FFFFFF" opacity="0.05"/>

      <g transform="translate(860 178)">
        <rect x="0" y="0" width="155" height="188" rx="22" fill="#061722" opacity="0.46" stroke="#66CBEA" stroke-opacity="0.12"/>
        <text x="18" y="32" fill="#66CBEA" opacity="0.78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0.62">ACTIVE PRODUCT LANES</text>
        <rect x="18" y="54" width="96" height="6" rx="3" fill="#FFFFFF" opacity="0.14"/>
        <rect x="18" y="71" width="118" height="6" rx="3" fill="#FFFFFF" opacity="0.1"/>
        <rect x="18" y="88" width="86" height="6" rx="3" fill="#FFFFFF" opacity="0.08"/>
        <circle cx="78" cy="138" r="38" fill="none" stroke="#247D8A" stroke-opacity="0.16"/>
        <circle cx="78" cy="138" r="27" fill="none" stroke="#66CBEA" stroke-opacity="0.12" stroke-dasharray="2 4"/>
      </g>

      <g transform="translate(1038 178)">
        <text x="0" y="32" fill="#FFFFFF" opacity="0.9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.4">Platform Overview</text>
        <rect x="0" y="52" width="262" height="7" rx="3.5" fill="#FFFFFF" opacity="0.14"/>

        <rect x="0" y="86" width="84" height="24" rx="10" fill="#247D8A" opacity="0.33"/>
        <text x="15" y="102" fill="#D8F5FF" opacity="0.85" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">SyncSOAP</text>
        <rect x="94" y="86" width="86" height="24" rx="10" fill="#FFFFFF" opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <text x="110" y="102" fill="#D8F5FF" opacity="0.48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">SyncSafety</text>
        <rect x="190" y="86" width="68" height="24" rx="10" fill="#FFFFFF" opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <text x="207" y="102" fill="#D8F5FF" opacity="0.48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700">Anki</text>

        <rect x="0" y="132" width="286" height="96" rx="20" fill="#020B13" opacity="0.25" stroke="#66CBEA" stroke-opacity="0.12" stroke-dasharray="3 4"/>
        <rect x="20" y="154" width="246" height="7" rx="3.5" fill="#FFFFFF" opacity="0.14"/>
        <rect x="20" y="171" width="218" height="7" rx="3.5" fill="#FFFFFF" opacity="0.1"/>
        <rect x="20" y="188" width="156" height="7" rx="3.5" fill="#247D8A" opacity="0.23"/>
      </g>
    </g>
