  <g opacity="0.18">
    <path d="M1272 66H1398" stroke="#66CBEA" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="1410" cy="66" r="3" fill="#66CBEA"/>
  </g>
</svg>
