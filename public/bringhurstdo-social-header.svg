    <rect x="90" y="274" width="34" height="3" rx="1.5" fill="#66CBEA" opacity="0.6"/>

    <text x="0" y="328" fill="#95AEB9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0.35">
